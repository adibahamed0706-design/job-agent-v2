name: Weekly Job Match Agent

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-job-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agent
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          JOB_AGENT_CONFIG_JSON: ${{ secrets.JOB_AGENT_CONFIG_JSON }}
        run: |
          python job_agent.py

      - name: Commit weekly report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "Weekly job recommendations update"
          git push
